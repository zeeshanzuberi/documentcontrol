<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Airblue Technical Publications</title>
  <style>
    :root {
      --ink: #18212f;
      --muted: #5f6b7a;
      --line: #d8dee8;
      --panel: #ffffff;
      --page: #f5f7fb;
      --airblue: #0076bd;
      --airgreen: #64a70b;
      --warn: #9f5b00;
      --bad: #ad1f2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .topbar {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 18px;
    }
    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--airblue), var(--airgreen));
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      letter-spacing: 0;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto 48px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(24, 33, 47, 0.04);
    }
    h1, h2, h3 {
      margin: 0 0 14px;
      letter-spacing: 0;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; }
    h3 { font-size: 14px; }
    .muted { color: var(--muted); }
    label {
      display: block;
      font-weight: 700;
      margin: 0 0 6px;
    }
    input[type="text"],
    input[type="date"],
    input[type="file"],
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }
    input[type="file"] { padding: 7px; }
    .field { margin-bottom: 14px; }
    .fields-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 18px;
    }
    button, .button {
      min-height: 38px;
      border: 1px solid var(--airblue);
      border-radius: 6px;
      background: var(--airblue);
      color: #fff;
      font-weight: 700;
      padding: 8px 14px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .button.secondary, button.secondary {
      background: #fff;
      color: var(--airblue);
    }
    .icon {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      background: #f8fafc;
    }
    .counts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .count {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .count strong {
      display: block;
      font-size: 20px;
      margin-bottom: 2px;
    }
    .notice {
      border-left: 4px solid var(--warn);
      padding: 10px 12px;
      background: #fff8ed;
      color: #4d3108;
      margin: 12px 0;
    }
    .error {
      border-left-color: var(--bad);
      background: #fff1f2;
      color: #6e1620;
    }
    .checkline {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 6px;
      font-weight: 700;
    }
    @media (max-width: 840px) {
      .grid, .fields-two, .counts { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; padding: 14px 0; }
      .actions { justify-content: stretch; flex-direction: column; }
      button, .button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">ab</div>
        <div>Airblue Technical Publications</div>
      </div>
      <div class="muted">Document Conversion Tool</div>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
